<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>انصحني</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1F2D28; --ink-soft:#63736C;
    --sage:#2F6E5E; --sage-dark:#204A3F; --sage-light:#E1EEE8;
    --sand:#F3EFE4; --sand-deep:#E9E2D0;
    --amber:#D98E3F; --amber-light:#F6E4CB;
    --dusk:#3B3465; --dusk-light:#E7E4F2;
    --danger:#C1503F; --danger-light:#F7E7E3;
    --white:#FFFFFF;
    --radius-lg:22px; --radius-md:16px; --radius-sm:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    font-family:'Tajawal', sans-serif; color:var(--ink);
  }
  #appRoot{
    min-height:100vh; width:100%; position:relative; overflow-x:hidden;
    background:
      radial-gradient(circle at 15% 10%, #EDE7D6 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, #E3E7DC 0%, transparent 45%),
      #EAE5D8;
    transition:background 1s ease;
  }
  .app-header{
    position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
    padding:16px 28px; backdrop-filter:blur(14px); background:rgba(255,255,255,.55);
    transition:background 1s ease, color .5s ease;
  }
  .brand{ display:flex; align-items:center; gap:9px; font-family:'Amiri'; font-size:20px; font-weight:700; color:var(--sage-dark); }
  .brand-dot{ width:9px; height:9px; border-radius:50%; background:var(--amber); display:inline-block; }
  .header-actions{ display:flex; gap:10px; }
  .app-panel{
    max-width:640px; margin:30px auto 70px; background:rgba(255,255,255,.62); backdrop-filter:blur(20px);
    border-radius:32px; padding:10px 30px 36px; box-shadow:0 40px 80px -32px rgba(31,45,40,.28);
    position:relative; z-index:2; transition:background 1s ease, box-shadow 1s ease;
  }
  @media (max-width:700px){
    .app-header{ padding:14px 18px; }
    .app-panel{ margin:18px 12px 50px; padding:8px 18px 28px; border-radius:24px; }
  }
  .screen{ padding:22px 0 10px; animation:fadeIn .4s ease; position:relative; z-index:2; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  h1,h2,h3{ font-family:'Amiri', serif; margin:0; }
  .eyebrow{ font-size:12px; color:var(--sage); font-weight:700; letter-spacing:.04em; margin-bottom:4px; }
  .muted{ color:var(--ink-soft); }
  .card{ background:var(--white); border-radius:var(--radius-lg); padding:18px; margin-bottom:14px; box-shadow:0 4px 16px rgba(31,45,40,.06); transition:background .5s ease, color .5s ease, border-color .5s ease; }
  .btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:15px; border:none; border-radius:var(--radius-md);
    background:var(--sage); color:#fff; font-family:'Tajawal'; font-weight:700; font-size:15px; cursor:pointer; transition:transform .15s ease, background .2s ease, box-shadow .2s ease;
    box-shadow:0 6px 18px -6px rgba(47,110,94,.55); }
  .btn:hover{ background:var(--sage-dark); transform:translateY(-2px); }
  .btn:active{ transform:translateY(0); }
  .btn:disabled{ opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn.secondary{ background:var(--sage-light); color:var(--sage-dark); box-shadow:none; }
  .btn.ghost{ background:transparent; color:var(--sage); font-weight:700; padding:10px; box-shadow:none; }
  .field{ width:100%; border:none; background:var(--white); border-radius:var(--radius-sm); padding:14px 16px; font-family:'Tajawal'; font-size:15px; color:var(--ink); box-shadow:inset 0 0 0 1.5px #E7E1D2; transition:box-shadow .2s ease, background .5s ease, color .5s ease; }
  .field:focus{ outline:none; box-shadow:inset 0 0 0 1.5px var(--sage); }
  textarea.field{ resize:none; }
  .row{ display:flex; gap:10px; }
  .chip{ padding:9px 14px; border-radius:999px; background:var(--sage-light); color:var(--sage-dark); font-size:13px; font-weight:500; cursor:pointer; border:1.5px solid transparent; user-select:none; transition:.2s; }
  .chip.selected{ background:var(--sage); color:#fff; }
  .chip-wrap{ display:flex; flex-wrap:wrap; gap:8px; }
  .arc-wrap{ position:relative; margin:6px 0 14px; }
  .arc-caption{ display:flex; justify-content:space-between; font-size:11px; color:var(--ink-soft); margin-top:6px; padding:0 6px;}
  .moment-card{ display:flex; align-items:center; gap:14px; cursor:pointer; }
  .moment-card:hover{ transform:translateY(-1px); }
  .moment-icon{ width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .moment-title{ font-weight:700; font-size:15px; }
  .moment-sub{ font-size:12.5px; color:var(--ink-soft); margin-top:2px; }
  .check{ margin-right:auto; }
  .progress-track{ display:flex; gap:5px; margin-bottom:22px; }
  .progress-seg{ flex:1; height:5px; border-radius:4px; background:var(--sand-deep); transition:background .3s; }
  .progress-seg.active{ background:var(--sage); }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .icon-btn{ width:36px; height:36px; border-radius:50%; background:var(--white); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink-soft); box-shadow:0 2px 6px rgba(31,45,40,.06); transition:.4s; }
  .icon-btn:hover{ color:var(--sage); }
  .icon-btn.recording{ background:var(--danger); color:#fff; animation:micPulse 1s ease-in-out infinite; }
  @keyframes micPulse{ 50%{ opacity:.6; } }
  .bubble{ background:var(--sage-light); border-radius:var(--radius-lg); padding:18px; display:flex; gap:10px; align-items:flex-start; color:var(--sage-dark); line-height:1.7; font-size:14.5px; transition:.5s; }
  .slider-value{ text-align:center; font-size:13px; color:var(--ink-soft); margin-top:4px; }
  input[type=range]{ width:100%; accent-color:var(--sage); }
  .yn-row{ display:flex; gap:10px; }
  .yn-btn{ flex:1; padding:13px; border-radius:var(--radius-sm); border:1.5px solid #E7E1D2; background:#fff; font-family:'Tajawal'; font-weight:600; cursor:pointer; color:var(--ink); transition:.2s; }
  .yn-btn.selected{ background:var(--sage-light); border-color:var(--sage); color:var(--sage-dark); }
  .report-section{ display:flex; gap:10px; margin-bottom:12px; }
  .report-icon{ width:30px; height:30px; border-radius:50%; background:var(--sage-light); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--sage);}
  .report-title{ font-weight:700; font-size:13.5px; margin-bottom:4px; }
  .report-text{ font-size:14px; line-height:1.7; }
  .referral-box{ background:var(--danger-light); border:1px solid #eccbc3; border-radius:var(--radius-md); padding:14px; display:flex; gap:10px; margin-bottom:14px; color:var(--danger); font-size:13.5px; line-height:1.6; }
  .breath-circle{ width:170px; height:170px; border-radius:50%; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; margin:0 auto; transition:width .9s ease, height .9s ease; box-shadow:0 0 0 10px rgba(255,255,255,.05); }
  .breath-num{ font-size:38px; font-weight:700; color:#fff; font-family:'Amiri'; }
  .star{ font-size:26px; cursor:pointer; color:#DDD6C4; transition:.15s; }
  .star.active{ color:var(--amber); transform:scale(1.08); }
  .auth-logo{ width:64px; height:64px; border-radius:20px; background:var(--sage); display:flex; align-items:center; justify-content:center; margin:0 auto 14px; box-shadow:0 10px 24px -8px rgba(47,110,94,.5);}
  .link-btn{ background:none; border:none; color:var(--sage); font-family:'Tajawal'; font-weight:700; font-size:13.5px; cursor:pointer; }
  .error-text{ color:var(--danger); font-size:13px; margin-top:2px; }
  .spinner{ width:30px; height:30px; border-radius:50%; border:3px solid rgba(47,110,94,.15); border-top-color:var(--sage); animation:spin 0.8s linear infinite; margin:0 auto; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .task-item{ display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--sand-deep); }
  .task-item:last-child{ border-bottom:none; }
  .checkbox{ width:21px; height:21px; border-radius:6px; border:2px solid #CFC8B4; flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.15s; }
  .checkbox.done{ background:var(--sage); border-color:var(--sage); color:#fff; }
  .score-badge{ display:flex; align-items:center; justify-content:center; flex-direction:column; width:74px; height:74px; border-radius:50%;
    background:conic-gradient(var(--sage) calc(var(--pct,0)*1%), #E9E2D0 0); flex-shrink:0; }
  .score-badge-inner{ width:58px; height:58px; border-radius:50%; background:var(--white); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; color:var(--sage-dark); }

  /* ---- Ambiances dynamiques (matin / midi / soir) — élément signature ---- */
  #appRoot[data-theme="neutral"]{ background:
      radial-gradient(circle at 15% 10%, #EDE7D6 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, #E3E7DC 0%, transparent 45%), #EAE5D8; }
  #appRoot[data-theme="morning"]{ background:linear-gradient(165deg, #FDF3E0 0%, #F8E7C4 45%, #F3EFE4 100%); }
  #appRoot[data-theme="midday"]{ background:linear-gradient(165deg, #EAF4EE 0%, #DCEEE4 45%, #F3EFE4 100%); }
  #appRoot[data-theme="evening"]{ background:linear-gradient(170deg, #211F3B 0%, #322C57 45%, #453D74 100%); color:#EDEAF6; }
  #appRoot[data-theme="evening"] .app-header{ background:rgba(255,255,255,.06); }
  #appRoot[data-theme="evening"] .brand{ color:#F6F3FA; }
  #appRoot[data-theme="evening"] .app-panel{ background:rgba(255,255,255,.05); box-shadow:0 40px 90px -30px rgba(0,0,0,.5); }
  #appRoot[data-theme="evening"] .card{ background:rgba(255,255,255,.07); color:#EDEAF6; box-shadow:none; border:1px solid rgba(255,255,255,.09); }
  #appRoot[data-theme="evening"] .field{ background:rgba(255,255,255,.09); color:#fff; box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.16); }
  #appRoot[data-theme="evening"] .field::placeholder{ color:rgba(237,234,246,.45); }
  #appRoot[data-theme="evening"] h1,#appRoot[data-theme="evening"] h2,#appRoot[data-theme="evening"] h3{ color:#F6F3FA; }
  #appRoot[data-theme="evening"] .muted{ color:rgba(237,234,246,.6); }
  #appRoot[data-theme="evening"] .icon-btn{ background:rgba(255,255,255,.1); color:#EDEAF6; box-shadow:none; }
  #appRoot[data-theme="evening"] .chip{ background:rgba(255,255,255,.09); color:#EDEAF6; }
  #appRoot[data-theme="evening"] .chip.selected{ background:var(--amber); color:#2C2A4A; }
  #appRoot[data-theme="evening"] .bubble{ background:rgba(255,255,255,.1); color:#F6F3FA; }
  #appRoot[data-theme="evening"] .yn-btn{ background:rgba(255,255,255,.07); color:#EDEAF6; border-color:rgba(255,255,255,.16); }
  #appRoot[data-theme="evening"] .yn-btn.selected{ background:var(--amber); color:#2C2A4A; border-color:var(--amber); }
  #appRoot[data-theme="evening"] .task-item{ border-bottom-color:rgba(255,255,255,.12); }
  #appRoot[data-theme="evening"] .progress-seg{ background:rgba(255,255,255,.14); }
  #appRoot[data-theme="evening"] .checkbox{ border-color:rgba(255,255,255,.35); }
  #appRoot[data-theme="evening"] .report-icon{ background:rgba(255,255,255,.12); color:var(--amber-light); }

  .stars-bg{ position:fixed; inset:0; z-index:1; pointer-events:none; opacity:0; transition:opacity 1s ease; }
  #appRoot[data-theme="evening"] .stars-bg{ opacity:1; }
  .star-dot{ position:absolute; width:2.5px; height:2.5px; background:#fff; border-radius:50%; animation:twinkle 3.5s ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{opacity:.15;} 50%{opacity:.9;} }

  .glow-sun{ position:fixed; top:-60px; right:-40px; width:280px; height:280px; border-radius:50%;
    background:radial-gradient(circle, rgba(217,142,63,.35), transparent 70%); z-index:1; pointer-events:none; opacity:0; transition:opacity 1s ease; }
  #appRoot[data-theme="morning"] .glow-sun{ opacity:1; }

  .confetti-wrap{ position:fixed; inset:0; overflow:hidden; z-index:30; pointer-events:none; }
  .confetti{ position:absolute; top:-10px; width:8px; height:8px; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(100vh) rotate(300deg); opacity:0; } }
</style>
</head>
<body>
<div id="appRoot" data-theme="neutral">
  <div class="stars-bg" id="starsBg"></div>
  <div class="glow-sun"></div>
  <div class="confetti-wrap" id="confettiWrap"></div>
  <header class="app-header" id="appHeader"></header>
  <div class="app-panel">
    <div class="screen" id="screen"><div style="text-align:center; padding-top:80px;"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
/* ============================================================
   انصحني — MVP (stockage en cache + appels IA à chaque étape)
   ============================================================ */

/* ---- Adaptateur de stockage : window.storage si disponible, sinon mémoire ---- */
const memoryStore = {};
const store = {
  async get(key){
    if(window.storage){
      try{ const r = await window.storage.get(key, false); return r ? r.value : null; }
      catch(e){ return null; }
    }
    return memoryStore[key] ?? null;
  },
  async set(key, value){
    if(window.storage){
      try{ await window.storage.set(key, value, false); return; }catch(e){ console.error(e); }
    }
    memoryStore[key] = value;
  }
};
async function getJson(key, fallback){ const raw = await store.get(key); if(!raw) return fallback; try{ return JSON.parse(raw); }catch(e){ return fallback; } }
async function setJson(key, value){ await store.set(key, JSON.stringify(value)); }

const todayStr = () => new Date().toISOString().substring(0,10);

const EMOTIONS = ['الخزي والعار','الذنب','جلد الذات','الاحتقار','الحزن والأسى','الندم','الإشمئزاز','التوتر','الخوف','الغضب','الغيرة','النقص','الرفض','الكراهية','الحقد','الفوبيا','الشفقة'];
const THINKING_ERRORS = ['التفكير الثنائي (أبيض أو أسود)','التهويل والتضخيم','التعميم المفرط','قراءة الأفكار','التنبؤ السلبي بالمستقبل','معايير "يجب" و"لازم"','التركيز على السلبي فقط','أخذ الأمور بشكل شخصي'];
const MORNING_ADHKAR = [
  'أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ.',
  'اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا وَبِكَ نَمُوتُ وَإِلَيْكَ النُّشُورُ.',
  'رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ ﷺ نَبِيًّا وَرَسُولًا.'
];
const EVENING_ADHKAR = [
  'أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ.',
  'اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ.',
  'اللَّهُمَّ عَالِمَ الْغَيْبِ وَالشَّهَادَةِ، فَاطِرَ السَّمَاوَاتِ وَالْأَرْضِ، رَبَّ كُلِّ شَيْءٍ وَمَلِيكَهُ.'
];

/* ---------- بطاقات النصائح العملية (على غرار النموذج المرفق) ---------- */
const TIPS = [
  { id:'anger', emotions:['الغضب'], title:'لا تغضب',
    badTitle:'الاندفاع وتحطيم ما حولك', goodTitle:'تهدئة والسيطرة على النفس',
    steps:['خذ نفسًا عميقًا من الأنف.','زفر ببطء من الفم.','هدّئ نفسك، ثم اتخذ القرار الصحيح لا قرار اللحظة.'],
    dhikr:'أعوذ بالله من الشيطان الرجيم', maxim:'القوة الحقيقية هي السيطرة على نفسك، وليس على الأشياء.' },
  { id:'sadness', emotions:['الحزن والأسى','الندم'], title:'لا تحزن',
    badTitle:'الانغلاق والاجترار', goodTitle:'التنفيس والاستعانة بالله',
    steps:['اعترف بمشاعرك دون إنكارها.','تحدث عنها مع شخص تثق به أو اكتبها.','تذكّر أن الفرج قريب بإذن الله.'],
    dhikr:'حسبنا الله ونعم الوكيل', maxim:'كل ضيق إلى فرج، وكل عسر إلى يسر.' },
  { id:'fear', emotions:['الخوف','التوتر','الفوبيا'], title:'لا تخف',
    badTitle:'الهروب والتجنب الدائم', goodTitle:'المواجهة الهادئة خطوة بخطوة',
    steps:['سمِّ مخاوفك بوضوح لنفسك.','تنفس ببطء لتهدئة جسدك أولًا.','واجه أصغر جزء من الموقف، ثم تدرّج.'],
    dhikr:'اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَافِيَةَ', maxim:'الشجاعة ليست غياب الخوف، بل التصرف رغم وجوده.' },
  { id:'guilt', emotions:['الذنب','جلد الذات'], title:'لا تجلد ذاتك',
    badTitle:'اللوم القاسي المستمر لنفسك', goodTitle:'التوبة والتصحيح دون قسوة',
    steps:['اعترف بالخطأ دون تضخيمه.','استغفر وصحّح ما يمكن تصحيحه.','امضِ قدمًا دون أن تسجن نفسك في الماضي.'],
    dhikr:'أَسْتَغْفِرُ اللَّهَ الْعَظِيمَ وَأَتُوبُ إِلَيْهِ', maxim:'من أخطأ ثم عاد واستقام، فقد أحسن.' },
  { id:'jealousy', emotions:['الغيرة','الحقد','الكراهية'], title:'لا تحسد',
    badTitle:'تمني زوال نعمة الآخرين', goodTitle:'الرضا والدعاء بالبركة',
    steps:['لاحظ الشعور دون أن تتصرف بناءً عليه.','ادعُ لمن حسدته بالبركة.','ركّز على تنمية ما لديك أنت.'],
    dhikr:'اللَّهُمَّ بَارِكْ فِيهِ وَلَا حَسَدَ', maxim:'الرضا كنز لا يفنى.' },
  { id:'shame', emotions:['الخزي والعار','الاحتقار','النقص','الرفض','الإشمئزاز'], title:'لا تحتقر نفسك',
    badTitle:'الشعور الدائم بالنقص أمام الآخرين', goodTitle:'تقدير الذات بواقعية',
    steps:['ذكّر نفسك بثلاث نقاط قوة لديك.','افصل بين الخطأ الذي فعلته وبين قيمتك كإنسان.','تعامل مع نفسك كما تعامل صديقًا تحبه.'],
    dhikr:'اللَّهُمَّ كَمَا حَسَّنْتَ خَلْقِي فَحَسِّنْ خُلُقِي', maxim:'قيمتك ليست في كمالك، بل في محاولتك المستمرة.' }
];
function findTipForEmotion(emotion){ return TIPS.find(t=>t.emotions.includes(emotion)) || null; }

/* ---------- فيديوهات د. فتحي سعيد (يُملأ لاحقًا بالروابط الحقيقية) ---------- */
// كل فيديو: { id: 'معرّف يوتيوب', title: 'العنوان بالعربية', emotions:[...], keywords:[...] }
const DR_VIDEOS = [
  { id:'hAkY8HeKe48', title:'ضعف الثقة بالنفس', emotions:['النقص','الاحتقار'], keywords:['ثقة بالنفس','ضعف الثقة','تقدير الذات'] },

function findVideoForEmotion(emotion){ return DR_VIDEOS.find(v=>v.emotions.includes(emotion)) || null; }

const VIDEO_MATCH_SYSTEM_PROMPT = `أنت مساعد يختار أنسب فيديو إرشادي للمستخدم من قائمة فيديوهات الدكتور فتحي سعيد، أخصائي نفسي.
أجب حصرًا بمعرّف الفيديو (id) الأنسب من القائمة المعطاة، دون أي نص إضافي. إذا لم يكن أي فيديو مناسبًا فعليًا لحالة المستخدم، أجب فقط بكلمة: none`;
async function pickRelevantVideo(automaticThought, emotion){
  if(DR_VIDEOS.length===0) return null;
  // مطابقة سريعة بالوسم أولًا كخط أساس
  const tagMatch = findVideoForEmotion(emotion);
  if(DR_VIDEOS.length===1) return tagMatch;
  // إن وُجد أكثر من فيديو محتمل، نطلب من الذكاء الاصطناعي اختيار الأنسب دلاليًا
  const listStr = DR_VIDEOS.map(v=>`id:${v.id} — العنوان: ${v.title} — الكلمات المفتاحية: ${(v.keywords||[]).join('، ')}`).join('\n');
  const userMsg = `فكرة المستخدم: "${automaticThought}"\nشعوره: ${emotion}\n\nقائمة الفيديوهات المتاحة:\n${listStr}`;
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:30, system:VIDEO_MATCH_SYSTEM_PROMPT, messages:[{role:"user", content:userMsg}] })
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('').trim();
    if(text.toLowerCase().includes('none')) return null;
    return DR_VIDEOS.find(v=>text.includes(v.id)) || tagMatch;
  }catch(e){ console.error(e); return tagMatch; }
}

function computeStreak(history){
  const set = new Set(history.map(h=>h.date));
  let streak=0; let d = new Date();
  for(let i=0;i<365;i++){
    const iso = d.toISOString().substring(0,10);
    if(set.has(iso)){ streak++; d.setDate(d.getDate()-1); }
    else { if(i===0){ d.setDate(d.getDate()-1); continue; } break; }
  }
  return streak;
}

function registerSpeak(text){ const id='sp'+(speakCounter++); speakRegistry[id]=text; return id; }
function speakText(text){
  try{
    if(!('speechSynthesis' in window)){
      alert('قراءة النصوص بصوت عالٍ غير مدعومة في هذه البيئة (قد تعمل بشكل طبيعي بعد نشر التطبيق على موقع حقيقي).');
      return;
    }
    if(!text) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ar-SA'; u.rate = 0.95; u.pitch = 1;
    u.onerror = (e)=>{ console.error('speechSynthesis error:', e); };
    window.speechSynthesis.speak(u);
  }catch(e){ console.error(e); alert('تعذّرت القراءة الصوتية في هذه البيئة.'); }
}

let activeRecognition = null;
function startVoiceInput(targetId, btnId){
  const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById(btnId);
  if(!SRClass){ alert('التعرف الصوتي غير مدعوم في هذا المتصفح حاليًا. جرّب متصفح Chrome على الحاسوب أو أندرويد.'); return; }
  if(activeRecognition){ activeRecognition.stop(); activeRecognition=null; if(btn) btn.classList.remove('recording'); return; }
  const target = document.getElementById(targetId);
  if(!target) return;
  const rec = new SRClass();
  rec.lang = 'ar-SA'; rec.interimResults = false; rec.maxAlternatives = 1;
  rec.onresult = (e)=>{ const text = e.results[0][0].transcript; target.value = (target.value.trim()? target.value.trim()+' ' : '') + text; };
  rec.onend = ()=>{ if(btn) btn.classList.remove('recording'); activeRecognition=null; };
  rec.onerror = (e)=>{
    if(btn) btn.classList.remove('recording');
    activeRecognition=null;
    let msg = 'تعذّر تشغيل التسجيل الصوتي.';
    if(e.error==='not-allowed' || e.error==='service-not-allowed') msg = 'تم رفض الوصول إلى الميكروفون. هذا متوقع داخل هذه المعاينة المدمجة — جرّب فتح الملف مباشرة في تبويب متصفح كامل (وليس داخل إطار مضمّن)، وامنح إذن الميكروفون عند الطلب.';
    else if(e.error==='no-speech') msg = 'لم يتم رصد أي كلام، حاول مجددًا.';
    alert(msg);
    console.error('SpeechRecognition error:', e.error);
  };
  activeRecognition = rec;
  if(btn) btn.classList.add('recording');
  try{
    rec.start();
  }catch(e){
    console.error(e);
    if(btn) btn.classList.remove('recording');
    alert('تعذّر بدء التسجيل الصوتي في هذه البيئة.');
  }
}

/* ---------- THÈME PAR AMBIANCE (matin / midi / soir) ---------- */
function themeForScreen(s){
  if(['morning_adhkar','morning_planning'].includes(s)) return 'morning';
  if(['lunch_choice','lunch_activity'].includes(s)) return 'midday';
  if(['evening_intro','cbt','cbt_report','evening_adhkar','day_eval','breathing'].includes(s)) return 'evening';
  return 'neutral';
}
function ensureStars(){
  const wrap = document.getElementById('starsBg');
  if(wrap.childElementCount) return;
  for(let i=0;i<18;i++){
    const d = document.createElement('div');
    d.className='star-dot';
    d.style.left = Math.random()*100+'%';
    d.style.top = Math.random()*70+'%';
    d.style.animationDelay = (Math.random()*3.5)+'s';
    wrap.appendChild(d);
  }
}

/* ---------- CARTE "MAINTENANT" (remplace l'arc, sensible à l'heure réelle) ---------- */
function currentTimeSlot(){
  const h = new Date().getHours();
  if(h>=4 && h<12) return 'morning';
  if(h>=12 && h<17) return 'midday';
  return 'evening';
}
const SLOT_META = {
  morning:{ emoji:'☀️', label:'الصباح', title:'حان وقت بداية يومك', text:'أذكار الصباح، ثم تحضير مخطط بسيط لمهامك.', action:"go('morning_adhkar')", cta:'ابدأ صباحك', bg:'linear-gradient(135deg,#FDF3E0,#F8E7C4)', color:'var(--amber)' },
  midday:{ emoji:'🌿', label:'الظهيرة', title:'حان وقت استراحة قصيرة', text:'نشاط بسيط لخمس دقائق يعيد لك توازنك.', action:"go('lunch_choice')", cta:'خذ استراحتك', bg:'linear-gradient(135deg,#EAF4EE,#DCEEE4)', color:'var(--sage)' },
  evening:{ emoji:'🌙', label:'المساء', title:'حان وقت مراجعة يومك', text:'إعادة صياغة الأفكار، أذكار المساء، وتنفس قبل النوم.', action:"go('evening_intro')", cta:'ابدأ مساءك', bg:'linear-gradient(135deg,#E7E4F2,#F3EFE4)', color:'var(--dusk)' }
};
function heroCard(){
  const slot = currentTimeSlot();
  const p = state.plan;
  const doneMap = { morning:p.morningDone, midday:p.lunchDone, evening:(p.eveningAdhkarDone && p.breathingDone) };
  let activeSlot = slot;
  if(doneMap[slot]){
    const order = ['morning','midday','evening'];
    const next = order.find(s=>!doneMap[s]);
    if(next) activeSlot = next;
  }
  const m = SLOT_META[activeSlot];
  const isDone = doneMap[activeSlot];
  return `
  <div class="card" style="background:${m.bg}; border:none; padding:22px;">
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="font-size:34px;">${m.emoji}</div>
      <div style="flex:1;">
        <div class="eyebrow" style="color:${m.color};">${m.label}</div>
        <div style="font-weight:800; font-size:16.5px;">${isDone? 'أحسنت! أكملت هذه المرحلة 🎉' : m.title}</div>
      </div>
    </div>
    <p style="font-size:13.5px; margin:12px 0 14px; color:var(--ink-soft);">${isDone? 'يمكنك تصفح مكتبة النصائح أو انتظار الموعد التالي.' : m.text}</p>
    ${!isDone ? `<button class="btn" onclick="${m.action}">${m.cta}</button>` : ''}
  </div>
  <div style="display:flex; gap:8px; margin:12px 0 18px;">
    ${['morning','midday','evening'].map(s=>`
    <div style="flex:1; display:flex; align-items:center; gap:6px; background:var(--white); border-radius:12px; padding:8px 10px; opacity:${s===activeSlot?1:.6};">
      <span style="font-size:15px;">${SLOT_META[s].emoji}</span>
      <span style="font-size:11px; font-weight:700; flex:1;">${SLOT_META[s].label}</span>
      <span style="color:${doneMap[s]?'var(--sage)':'#CFC8B4'};">${doneMap[s]?ic.check:'○'}</span>
    </div>`).join('')}
  </div>`;
}

/* ---------- COURBE D'ÉVOLUTION DES NOTES ---------- */
function formatShortDate(iso){ const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('ar-EG',{day:'numeric', month:'short'}); }
function scoreChart(){
  const history = [...state.scoreHistory].sort((a,b)=> a.date.localeCompare(b.date));
  if(history.length===0){
    return `<div class="card" style="text-align:center; padding:26px 10px;">
      <div style="color:var(--sage); margin-bottom:6px;">${ic.chart}</div>
      <p class="muted" style="font-size:13px;">أكمل يومك الأول ليبدأ رسم رحلتك هنا 📈</p>
    </div>`;
  }
  const last = history.slice(-14);
  const w=300,h=110,pad=16, maxS=100;
  const stepX = last.length>1 ? (w-2*pad)/(last.length-1) : 0;
  const pts = last.map((d,i)=>[pad+i*stepX, h-pad-(d.score/maxS)*(h-2*pad)]);
  const pathD = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const areaD = pts.length>1 ? `${pathD} L ${pts[pts.length-1][0].toFixed(1)} ${h-pad} L ${pts[0][0].toFixed(1)} ${h-pad} Z` : '';
  const lastScore = last[last.length-1].score;
  return `
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <span style="font-weight:700; font-size:14px;">رحلتك خلال الأيام الماضية</span>
      <span style="font-weight:800; color:var(--sage); font-size:15px;">${lastScore}/100</span>
    </div>
    <svg width="100%" viewBox="0 0 ${w} ${h}" height="${h}">
      <defs><linearGradient id="scoreGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2F6E5E" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#2F6E5E" stop-opacity="0"/>
      </linearGradient></defs>
      ${areaD?`<path d="${areaD}" fill="url(#scoreGrad)" stroke="none"/>`:''}
      <path d="${pathD}" fill="none" stroke="#2F6E5E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.4" fill="#fff" stroke="#2F6E5E" stroke-width="2"/>`).join('')}
    </svg>
    <div style="display:flex; justify-content:space-between; font-size:10.5px; color:var(--ink-soft); margin-top:2px;">
      <span>${formatShortDate(last[0].date)}</span><span>${formatShortDate(last[last.length-1].date)}</span>
    </div>
  </div>`;
}

  return `

  </div>

function onboardingNext(){
  if((state.onboardingIndex||0) < ONBOARDING_SLIDES.length-1){ setState({onboardingIndex:(state.onboardingIndex||0)+1}); }
  else { finishOnboarding(); }
}
async function finishOnboarding(){
  await setJson(`ansahni:onboarded:${state.email}`, true);
  setState({screen:'home', onboardingIndex:0});
}

function topbar(title, onBack, onLogout){
  return `<div class="topbar">
    ${onBack?`<button class="icon-btn" onclick="${onBack}">${ic.back}</button>`:'<span style="width:36px"></span>'}

    ${onLogout?`<button class="icon-btn" onclick="${onLogout}">${ic.logout}</button>`:'<span style="width:36px"></span>'}
  </div>`;
}

/* ---------- نقاط المكافأة (5 نقاط لكل يوم مكتمل، حتى 200 = استشارة مجانية) ---------- */
const REWARD_TARGET = 200;
const REWARD_DOCTOR = 'د. فتحي سعيد';
function rewardsCard(){
  const pts = state.points||0;
  if(state.rewardClaimed){
    return `<div class="card" style="text-align:center; background:linear-gradient(160deg,#FFF6E6,#F3EFE4); border:1px solid #F0DBA6;">
      <div style="font-size:26px; margin-bottom:6px;">✅</div>
      <div style="font-weight:800; font-size:14.5px;">تم إرسال طلبك بنجاح</div>
      <p class="muted" style="font-size:12.5px; margin-top:6px;">سنتواصل معك قريبًا لتحديد موعد استشارتك مع ${REWARD_DOCTOR}. (نسخة تجريبية للعرض)</p>
      <button class="btn secondary" style="margin-top:12px;" onclick="setState({rewardClaimed:false})">إغلاق</button>
    </div>`;
  }
  if(pts>=REWARD_TARGET){
    return `<div class="card" style="text-align:center; background:linear-gradient(160deg,#FFF6E6,#F3EFE4); border:1px solid #F0DBA6;">
      <div style="font-size:30px; margin-bottom:6px;">🎉</div>
      <div style="font-weight:800; font-size:15.5px;">لقد فزت باستشارة مجانية!</div>
      <div class="muted" style="font-size:12.5px; margin-top:4px;">مع ${REWARD_DOCTOR}، أخصائي نفسي</div>
      <button class="btn amber" style="margin-top:14px;" onclick="claimReward()">احجز استشارتك الآن</button>
    </div>`;
  }
  const pct = Math.min(100, Math.round((pts/REWARD_TARGET)*100));
  return `<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <span style="font-weight:700; font-size:14px;">🏆 نقاط المكافأة</span>
      <span style="font-weight:800; color:var(--amber); font-size:14px;">${pts}/${REWARD_TARGET}</span>
    </div>
    <div style="height:8px; border-radius:5px; background:var(--sand-deep); overflow:hidden;">
      <div style="height:100%; width:${pct}%; background:var(--amber); border-radius:5px; transition:width .6s ease;"></div>
    </div>
    <p class="muted" style="font-size:12px; margin-top:8px;">كل يوم تُكمله يمنحك 5 نقاط. اجمع ${REWARD_TARGET-pts} نقطة أخرى لتفوز باستشارة مجانية مع ${REWARD_DOCTOR}.</p>
  </div>`;
}
async function claimReward(){
  state.points = Math.max(0, (state.points||0) - REWARD_TARGET);
  await setJson(`ansahni:points:${state.email}`, state.points);
  setState({rewardClaimed:true});
}

let breathingTimer=null, breathingSeconds=60;
function startLunchActivity(key){
  state.plan.lunchType = key; state.screen='lunch_activity';
  if(key==='breathing'){ breathingSeconds=60; clearInterval(breathingTimer);
    breathingTimer=setInterval(()=>{ breathingSeconds--; if(breathingSeconds<=0){clearInterval(breathingTimer);} render(); },1000);
  }
  render();
}
function screenLunchActivity(){
  const key = state.plan.lunchType;
  let body='';
  if(key==='breathing'){
    body = `<div style="text-align:center; padding-top:20px;">
      <div style="color:var(--sage); margin-bottom:16px;">${ic.spa}</div>
      <p style="font-size:15.5px;">تنفس بعمق... شهيق من الأنف، زفير من الفم</p>

const CBT_TOTAL_STEPS = 5;

  let segs=''; for(let i=0;i<CBT_TOTAL_STEPS;i++){ segs += `<div class="progress-seg ${i<=state.cbt.step?'active':''}"></div>`; }
  return `<div class="progress-track">${segs}</div>`;
}

/* ---- Appels IA réels (API Anthropic, disponible dans cet aperçu) ---- */
const STEP_SYSTEM_PROMPT = `أنت مساعد نفسي داعم ضمن تطبيق "انصحني"، يرافق المستخدم في تمرين "تقييم الأفكار التلقائية" (CBT/ACT).
اكتب من 3 إلى 4 جمل دافئة وغنية بالمعنى بالعربية الفصحى البسيطة، بأسلوب متعاطف ومشجّع، وكأنك مرافق حقيقي يستمع باهتمام، دون أي مقدمات أو عناوين.
كن محددًا لا عامًا: اعكس تفصيلًا حقيقيًا مما قاله المستخدم بدلًا من عبارة جاهزة، ثم أضف رأيًا أو ملاحظة مفيدة واحدة. لا تُطِل، لكن لا تكن سطحيًا أيضًا.
لا تقدّم تشخيصًا طبيًا أو نفسيًا أبدًا ولا تصف أدوية. لا تكرر كلام المستخدم حرفيًا، بل أعد صياغته بأسلوبك.`;
async function aiStepFeedback(promptContext, fallbackText){
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:500, system:STEP_SYSTEM_PROMPT, messages:[{role:"user", content:promptContext}] })
    });
    if(!res.ok){ throw new Error('HTTP '+res.status); }
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('').trim();
    if(!text) throw new Error('Réponse vide de l\'API');
    console.log('[انصحني] رد الذكاء الاصطناعي (خطوة):', text);
    return { text, aiUsed:true };
  }catch(e){
    console.error('[انصحني] فشل الاتصال بالذكاء الاصطناعي في هذه الخطوة:', e);
    return { text:fallbackText, aiUsed:false };
  }
}

async function runAiReport(){
  setState({aiLoading:true, aiError:'', aiReport:null});
  const c = state.cbt;
  const userMsg = `الفكرة التلقائية: ${c.automaticThought}
درجة الاعتقاد بها قبل التمرين: ${c.beliefBefore}/100
الشعور: ${c.emotion} (شدته: ${c.emotionIntensity}/100)

هل تضره الآن: ${state.harmsNowText()}
أخطاء التفكير: ${c.thinkingErrors.join('، ')||'لا شيء محدد'}
الفكرة الجديدة: ${c.newThoughtUser}
درجة الاعتقاد بالجديدة: ${c.beliefAfter}/100
درجة الاعتقاد بالقديمة بعد التمرين: ${c.beliefOldAfter}/100`;

function setDayRating(v){ patchPlan({dayRating:v}); }
function finishDayEval(){
  const notes = document.getElementById('dayNotesInput').value.trim();
  patchPlan({dayNotes:notes});
  go('breathing');
}

/* ---- Respiration 3-7-8 ---- */
let breathPhaseTimer=null;
let breath = {phase:'inhale', seconds:3, cycles:4};
const BREATH_DURATIONS = {inhale:3, hold:7, exhale:8};
const BREATH_LABELS = {inhale:'شهيق من الأنف ببطء...', hold:'احبس النفس...', exhale:'زفير من الفم ببطء...'};
function startBreathing(){
  breath = {phase:'inhale', seconds:3, cycles:4};
  clearInterval(breathPhaseTimer);
  breathPhaseTimer = setInterval(()=>{
    breath.seconds--;
    if(breath.seconds<=0){
      if(breath.phase==='inhale') breath.phase='hold';
      else if(breath.phase==='hold') breath.phase='exhale';
      else { breath.cycles--; if(breath.cycles<=0){ clearInterval(breathPhaseTimer); breath.phase='done'; onDayFinished(); return;} breath.phase='inhale'; }
      breath.seconds = BREATH_DURATIONS[breath.phase] || 0;
    }
    render();
  },1000);
}
function screenBreathing(){
  if(breath.phase==='inhale' && breath.seconds===3 && !breathPhaseTimer) startBreathing();
  if(breath.phase==='done') return screenDayFinished();
  const scaleMap = {inhale: 130+40*(1-breath.seconds/3), hold:170, exhale: 170-40*(1-breath.seconds/8)};
  const size = Math.round(scaleMap[breath.phase]||150);
  return `${topbar('تنفس عميق', null)}
  <div style="text-align:center; padding-top:20px;">
    <div class="breath-circle" style="width:${size}px; height:${size}px;"><span class="breath-num">${breath.seconds}</span></div>
    <p style="margin-top:26px; font-size:16px;">${BREATH_LABELS[breath.phase]}</p>
    <p class="muted" style="margin-top:6px; font-size:13px;">الدورات المتبقية: ${breath.cycles}</p></div>`;
}

/* ---- Note du jour /100 + note IA personnalisée ---- */
function computeDayScore(plan, cbtCompleted){
  let score = 0;
  score += plan.morningDone ? 15 : 0;
  if(plan.tasks.length>0){ score += Math.round((plan.tasks.filter(t=>t.done).length/plan.tasks.length)*15); }
  else { score += 8; }
  score += plan.lunchDone ? 15 : 0;
  score += cbtCompleted ? 20 : 0;
  score += plan.eveningAdhkarDone ? 10 : 0;
  score += true ? 10 : 0; // la respiration vient de se terminer à cet instant
  score += plan.dayRating ? Math.round((plan.dayRating/5)*15) : 0;
  return Math.min(100, score);
}
const NOTE_SYSTEM_PROMPT = `أنت مدرّب داعم ضمن تطبيق "انصحني". بناءً على ملخص يوم المستخدم ودرجته من 100، اكتب ملاحظة (4-5 جمل) بالعربية:
اذكر باختصار ما أنجزه اليوم وما يعنيه ذلك، ثم نقطة واحدة يمكن تحسينها غدًا، وانهِ بجملة تحفيزية دافئة وشخصية. لا تقدّم تشخيصًا طبيًا أو نفسيًا. لا تستخدم رموزًا مثل JSON، اكتب نصًا عاديًا فقط.`;
async function generateDailyNote(plan, score){
  const summary = `أنجز المستخدم اليوم: أذكار الصباح: ${plan.morningDone?'نعم':'لا'}. المهام المنجزة: ${plan.tasks.filter(t=>t.done).length}/${plan.tasks.length}. نشاط الظهيرة: ${plan.lunchDone?'نعم':'لا'}. تمرين إعادة صياغة الأفكار: مكتمل. أذكار المساء: ${plan.eveningAdhkarDone?'نعم':'لا'}. تمرين التنفس: مكتمل. تقييمه الذاتي ليومه: ${plan.dayRating||'غير محدد'}/5. النقطة الإجمالية: ${score}/100.`;
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:500, system:NOTE_SYSTEM_PROMPT, messages:[{role:"user", content:summary}] })
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('').trim();
    return text || fallbackDailyNote(score);
  }catch(e){ console.error(e); return fallbackDailyNote(score); }
}
function fallbackDailyNote(score){
  if(score>=85) return 'يوم رائع! أنجزت جميع خطواتك تقريبًا بثبات جميل. استمر بهذا الإيقاع، فهو يبني عادات قوية مع الوقت.';
  if(score>=60) return 'يوم جيد جدًا. أنجزت أغلب برنامجك، وهذا يستحق التقدير. حاول غدًا إكمال ما فاتك بخطوة صغيرة إضافية.';
  if(score>=40) return 'لا بأس، كل يوم فيه تقدّم يُحسب، حتى لو كان بسيطًا. حاول غدًا أن تبدأ بخطوة واحدة تشعرك بالإنجاز.';
  return 'يوم صعب، ولكنه ليس فشلًا. الاستمرار في المحاولة هو ما يصنع الفرق. غدًا فرصة جديدة، وأنت قادر عليها.';
}
async function onDayFinished(){
  const cbtCompleted = !!state.aiReport;
  const score = computeDayScore(state.plan, cbtCompleted);
  patchPlan({score});
  render(); // affiche l'écran final avec spinner pour la note IA
  const note = await generateDailyNote(state.plan, score);
  state.plan.dailyNote = note;
  await patchPlan({dailyNote:note});
  if(state.autoSpeak) speakText(note);
  const history = state.scoreHistory.filter(h=>h.date!==todayStr());
  history.push({date: todayStr(), score, note});
  state.scoreHistory = history;
  await setJson(`ansahni:scores:${state.email}`, history);
  if(!state.plan.pointsAwarded){
    state.points = (state.points||0) + 5;
    await setJson(`ansahni:points:${state.email}`, state.points);
    await patchPlan({pointsAwarded:true});
  }
  render();
  launchConfetti();
}
function screenDayFinished(){
  const score = state.plan.score;
  return `${topbar('اكتمل يومك', null)}
  <div class="confetti-wrap" id="confettiWrap"></div>
  <div style="text-align:center; padding-top:20px;">
    <div style="display:flex; justify-content:center; margin-bottom:10px;">${companionAvatar(56)}</div>
    <h2 style="font-size:21px;">أحسنت! لقد أنهيت برنامج اليوم كاملًا.</h2>
  </div>
  <div class="card" style="text-align:center; margin-top:18px;">
    ${score==null ? `<div class="spinner"></div><p class="muted" style="margin-top:10px; font-size:13px;">جارٍ حساب نقطتك...</p>` : `
    <div class="score-badge" style="--pct:${score}; margin:0 auto;"><div class="score-badge-inner">${score}</div></div>
    <p style="margin-top:12px; font-weight:700;">نقطتك اليوم من 100</p>
    <div style="text-align:right; margin-top:14px;">${companionSpeech(state.plan.dailyNote || '...', 34)}</div>
    ${state.plan.pointsAwarded ? `<div style="margin-top:12px; display:inline-block; background:var(--amber-light); color:var(--amber); font-weight:700; font-size:12.5px; padding:6px 14px; border-radius:999px;">+5 🏆 نقاط مكافأة</div>` : ''}`}
  </div>
  <button class="btn" style="margin-top:10px;" onclick="clearInterval(breathPhaseTimer); go('home')">العودة إلى الرئيسية</button>`;
}
function launchConfetti(){
  const wrap = document.getElementById('confettiWrap');
  if(!wrap) return;
  const colors = ['#D98E3F','#2F6E5E','#F6E4CB','#E7E4F2'];
  for(let i=0;i<26;i++){
    const el = document.createElement('div');
    el.className='confetti';
    el.style.left = Math.random()*100+'%';
    el.style.background = colors[i%colors.length];
    el.style.animationDuration = (1.6+Math.random()*1.2)+'s';
    el.style.animationDelay = (Math.random()*0.4)+'s';
    wrap.appendChild(el);
  }
  setTimeout(()=>{ if(wrap) wrap.innerHTML=''; }, 3200);
}

/* ============================================================
   PERSISTANCE (plan du jour + historique des notes)
   ============================================================ */
function planKey(email){ return `ansahni:plan:${email}:${todayStr()}`; }
async function loadTodayPlan(email){
  const saved = await getJson(planKey(email), null);
  state.plan = saved || { morningDone:false, tasks:[], lunchDone:false, lunchType:null, eveningAdhkarDone:false, breathingDone:false, dayRating:0, dayNotes:'', score:null, dailyNote:null, pointsAwarded:false };
  state.scoreHistory = await getJson(`ansahni:scores:${email}`, []);
  state.points = await getJson(`ansahni:points:${email}`, 0);
  state.autoSpeak = await getJson(`ansahni:autospeak:${email}`, false);
}
async function patchPlan(patch){
  state.plan = {...state.plan, ...patch};
  render();
  await setJson(planKey(state.email), state.plan);
}
function addTask(){
  const input = document.getElementById('taskInput');
  const val = input.value.trim(); if(!val) return;
  state.plan.tasks.push({title:val, done:false});
  patchPlan({tasks: state.plan.tasks});
}
function toggleTask(i){ state.plan.tasks[i].done = !state.plan.tasks[i].done; patchPlan({tasks: state.plan.tasks}); }

async function startEveningFlow(){
  state.cbt = { step:0, showReflection:false, reflectionText:'', reflectionLoading:false, automaticThought:'', beliefBefore:50, emotion:'', emotionIntensity:50,
    evidenceFor:'', evidenceAgainst:'', helpsNow:null, harmsNow:null, thinkingErrors:[], newThoughtUser:'', beliefAfter:50, beliefOldAfter:50 };
  state.aiReport = null; state.aiError='';
  go('cbt');
}

/* ---- Entrée sans mot de passe : juste un email (compte créé automatiquement si absent) ---- */
async function doEnter(){
  const name = document.getElementById('fullname').value.trim();
  const email = document.getElementById('email').value.trim();
  if(!email){ setState({authError:'يرجى إدخال بريد إلكتروني للمتابعة'}); return; }
  const accounts = await getJson('ansahni:accounts', {});
  if(!accounts[email]) accounts[email] = { fullName:name };
  else if(name) accounts[email].fullName = name;
  await setJson('ansahni:accounts', accounts);
  state.email = email; state.userName = accounts[email].fullName || email.split('@')[0];
  await setJson('ansahni:session', {email});
  await loadTodayPlan(email);
  const onboarded = await getJson(`ansahni:onboarded:${email}`, false);
  setState({screen: onboarded ? 'home' : 'onboarding', onboardingIndex:0, authError:''});
}
async function doLogout(){
  await setJson('ansahni:session', null);
  state.email=''; state.userName='';
  state.plan = { morningDone:false, tasks:[], lunchDone:false, lunchType:null, eveningAdhkarDone:false, breathingDone:false, dayRating:0, dayNotes:'', score:null, dailyNote:null, pointsAwarded:false };
  setState({screen:'login'});
}

/* ============================================================
   ROUTEUR / RENDU
   ============================================================ */
function render(){
  const rootEl = document.getElementById('appRoot');
  rootEl.dataset.theme = themeForScreen(state.screen);
  if(rootEl.dataset.theme==='evening') ensureStars();
  document.getElementById('appHeader').innerHTML = renderHeader();
  const el = document.getElementById('screen');
  let html='';
  switch(state.screen){
    case 'login': html = screenLogin(); break;
    case 'onboarding': html = screenOnboarding(); break;
    case 'home': html = screenHome(); break;
    case 'morning_adhkar': html = screenMorningAdhkar(); break;
    case 'morning_planning': html = screenMorningPlanning(); break;
    case 'lunch_choice': html = screenLunchChoice(); break;
    case 'lunch_activity': html = screenLunchActivity(); break;
    case 'evening_intro': html = screenEveningIntro(); break;
    case 'cbt': html = screenCbt(); break;
    case 'cbt_report': html = screenCbtReport(); break;
    case 'evening_adhkar': html = screenEveningAdhkar(); break;
    case 'day_eval': html = screenDayEval(); break;
    case 'breathing': html = screenBreathing(); break;
    case 'library': html = screenLibrary(); break;
    case 'tip_detail': html = screenTipDetail(); break;
    case 'video_library': html = screenVideoLibrary(); break;
    case 'video_detail': html = screenVideoDetail(); break;
    default: html = screenHome();
  }
  el.innerHTML = html;
}

/* ---- Initialisation : reprise de session depuis le cache ---- */
(async function init(){
  try{
    const session = await getJson('ansahni:session', null);
    if(session && session.email){
      const accounts = await getJson('ansahni:accounts', {});
      const acc = accounts[session.email];
      state.email = session.email;
      state.userName = (acc && acc.fullName) || session.email.split('@')[0];
      await loadTodayPlan(session.email);
      state.screen = 'home';
    }
  }catch(e){ console.error(e); }
  render();
})();
</script>
